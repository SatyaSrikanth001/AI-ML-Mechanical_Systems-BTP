<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>齿轮寿命预测分析系统</title>
    <style>
        :root {
            --primary-blue: #3B82F6;
            --dark-blue: #1E3A8A;
            --light-blue: #E0F2FE;
            --purple: #8B5CF6;
            --green: #10B981;
            --yellow: #F59E0B;
            --red: #EF4444;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-500: #6B7280;
            --gray-700: #374151;
            --gray-900: #111827;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #E0F2FE 0%, #F3E8FF 100%);
            min-height: 100vh;
            color: var(--gray-700);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部 */
        .header {
            background: white;
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary-blue), var(--purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
        }

        .logo-text h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-blue), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text p {
            font-size: 14px;
            color: var(--gray-500);
        }

        /* 主要内容区 */
        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--gray-200);
        }

        .card-icon {
            width: 36px;
            height: 36px;
            background: var(--light-blue);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-blue);
            font-size: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--gray-900);
        }

        /* 输入面板 */
        .input-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-700);
        }

        .input-field {
            padding: 10px 14px;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        textarea.input-field {
            min-height: 100px;
            resize: vertical;
        }

        /* 齿轮参数表格 */
        .params-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .params-table th,
        .params-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
        }

        .params-table th {
            background: var(--gray-50);
            font-weight: 600;
            color: var(--gray-700);
        }

        .params-table tr:hover {
            background: var(--gray-50);
        }

        /* 按钮 */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-blue), var(--purple));
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 分析报告 */
        .report-section {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-icon {
            width: 28px;
            height: 28px;
            background: var(--light-blue);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        /* 寿命预测图表 */
        .life-prediction-chart {
            background: var(--gray-50);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .life-meter {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .life-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: conic-gradient(
                var(--green) 0deg,
                var(--green) 120deg,
                var(--yellow) 120deg,
                var(--yellow) 240deg,
                var(--red) 240deg,
                var(--red) 360deg
            );
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .life-inner {
            width: 160px;
            height: 160px;
            background: white;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .life-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--gray-900);
        }

        .life-unit {
            font-size: 14px;
            color: var(--gray-500);
        }

        /* 风险等级 */
        .risk-levels {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 20px;
        }

        .risk-card {
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            color: white;
            font-weight: 600;
        }

        .risk-low {
            background: var(--green);
        }

        .risk-medium {
            background: var(--yellow);
        }

        .risk-high {
            background: var(--red);
        }

        /* 建议卡片 */
        .recommendation-card {
            background: var(--light-blue);
            border-left: 4px solid var(--primary-blue);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .recommendation-title {
            font-weight: 600;
            color: var(--dark-blue);
            margin-bottom: 8px;
        }

        .recommendation-text {
            font-size: 14px;
            color: var(--gray-700);
            line-height: 1.6;
        }

        /* 加载状态 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--gray-200);
            border-top: 4px solid var(--primary-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-left: 16px;
            color: var(--gray-600);
            font-size: 16px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--gray-400);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--gray-500);
            margin-bottom: 8px;
        }

        /* 状态徽章 */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-good {
            background: #D1FAE5;
            color: #065F46;
        }

        .status-warning {
            background: #FEF3C7;
            color: #92400E;
        }

        .status-danger {
            background: #FEE2E2;
            color: #991B1B;
        }

        /* 分析详情 */
        .analysis-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 20px;
        }

        .analysis-item {
            background: var(--gray-50);
            padding: 16px;
            border-radius: 8px;
        }

        .analysis-label {
            font-size: 13px;
            color: var(--gray-500);
            margin-bottom: 4px;
        }

        .analysis-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--gray-900);
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }

            .header {
                padding: 16px;
                flex-direction: column;
                gap: 12px;
            }

            .analysis-grid {
                grid-template-columns: 1fr;
            }

            .risk-levels {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">⚙️</div>
                <div class="logo-text">
                    <h1>齿轮寿命预测系统</h1>
                    <p>基于AI深度分析的智能预测平台</p>
                </div>
            </div>
            <div id="model-status" class="status-badge status-good">
                <span>●</span>
                <span>模型就绪</span>
            </div>
        </header>

        <!-- 主要内容 -->
        <div class="main-grid">
            <!-- 左侧输入面板 -->
            <div class="input-panel">
                <!-- 缺陷信息输入 -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-icon">📊</div>
                        <h3 class="card-title">缺陷检测结果</h3>
                    </div>
                    <div class="input-group">
                        <label class="input-label">检测结果JSON</label>
                        <textarea id="defect-data" class="input-field" placeholder='请输入检测结果，格式如：
[
  {
    "class": 0,
    "name": "点蚀",
    "confidence": 0.85,
    "bbox": {"x": 100, "y": 200, "width": 50, "height": 50}
  }
]'></textarea>
                    </div>
                    <div class="input-group">
                        <label class="input-label">运行时长（小时）</label>
                        <input type="number" id="running-hours" class="input-field" placeholder="例如：5000" value="0">
                    </div>
                </div>

                <!-- 齿轮参数 -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-icon">⚙️</div>
                        <h3 class="card-title">齿轮参数</h3>
                    </div>
                    <table class="params-table">
                        <tr>
                            <th>参数</th>
                            <th>数值</th>
                        </tr>
                        <tr>
                            <td>材料</td>
                            <td>12Cr2Ni4A</td>
                        </tr>
                        <tr>
                            <td>模数</td>
                            <td>3 mm</td>
                        </tr>
                        <tr>
                            <td>齿数</td>
                            <td>主: 34 / 从: 37</td>
                        </tr>
                        <tr>
                            <td>压力角</td>
                            <td>25°</td>
                        </tr>
                        <tr>
                            <td>屈服应力</td>
                            <td>785 MPa</td>
                        </tr>
                        <tr>
                            <td>额定扭矩</td>
                            <td>50.01 N·m</td>
                        </tr>
                        <tr>
                            <td>额定转速</td>
                            <td>4392 r/min</td>
                        </tr>
                    </table>
                </div>

                <!-- 分析按钮 -->
                <button id="analyze-btn" class="btn btn-primary">
                    <span>🤖</span>
                    <span>开始AI分析</span>
                </button>
            </div>

            <!-- 右侧报告显示 -->
            <div id="report-container" class="card">
                <div class="empty-state">
                    <div class="empty-icon">📈</div>
                    <div class="empty-title">等待分析</div>
                    <div>请输入缺陷检测结果并点击分析按钮</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 齿轮参数（基于您提供的图片）
        const gearParams = {
            material: "12Cr2Ni4A",
            module: 3,  // 模数 mm
            teethMain: 34,  // 主齿轮齿数
            teethDriven: 37,  // 从齿轮齿数
            pressureAngle: 25,  // 压力角
            yieldStrength: 785,  // 屈服应力 MPa
            ultimateStrength: 2000,  // 强度系数 MPa
            elasticModulus: 207500,  // 弹性模量 MPa (取中值)
            density: 7.84,  // 密度 g/cm³
            poissonRatio: 0.285,  // 泊松比 (取中值)
            frictionCoef: 0.1,  // 摩擦系数 (润滑良好取中值)
            ratedTorque: 50.01,  // 额定扭矩 N·m
            ratedSpeed: 4392  // 额定转速 r/min
        };

        // DOM元素
        const defectDataInput = document.getElementById('defect-data');
        const runningHoursInput = document.getElementById('running-hours');
        const analyzeBtn = document.getElementById('analyze-btn');
        const reportContainer = document.getElementById('report-container');
        const modelStatus = document.getElementById('model-status');

        // 检查模型状态
        async function checkModelStatus() {
            try {
                // 假设deepseek模型运行在本地的某个端口
                const response = await fetch('http://localhost:8080/health');
                if (response.ok) {
                    updateModelStatus('ready');
                } else {
                    updateModelStatus('offline');
                }
            } catch (error) {
                updateModelStatus('offline');
            }
        }

        function updateModelStatus(status) {
            if (status === 'ready') {
                modelStatus.className = 'status-badge status-good';
                modelStatus.innerHTML = '<span>●</span><span>模型就绪</span>';
            } else {
                modelStatus.className = 'status-badge status-danger';
                modelStatus.innerHTML = '<span>●</span><span>模型离线</span>';
            }
        }

        // 定义发送给大模型的提示词和格式
        function buildPrompt(defectData, runningHours) {
            const prompt = `作为一个齿轮寿命预测专家，请基于以下信息分析齿轮状态并预测剩余寿命：

## 齿轮基本参数
- 材料：${gearParams.material}
- 模数：${gearParams.module} mm
- 齿数：主齿轮${gearParams.teethMain}，从齿轮${gearParams.teethDriven}
- 压力角：${gearParams.pressureAngle}°
- 屈服应力：${gearParams.yieldStrength} MPa
- 弹性模量：${gearParams.elasticModulus} MPa
- 额定扭矩：${gearParams.ratedTorque} N·m
- 额定转速：${gearParams.ratedSpeed} r/min

## 当前运行状态
- 已运行时长：${runningHours} 小时
- 检测到的缺陷：${JSON.stringify(defectData, null, 2)}

请按照以下JSON格式返回分析结果：
{
  "lifeAnalysis": {
    "remainingLife": {
      "value": 数值,
      "unit": "小时",
      "confidence": 0-1之间的置信度
    },
    "currentCondition": {
      "score": 0-100的健康分数,
      "level": "良好/一般/较差",
      "description": "当前状态描述"
    },
    "riskAssessment": {
      "immediateRisk": "低/中/高",
      "criticalComponents": ["受影响的部件列表"],
      "failureProbability": 0-1之间的概率
    }
  },
  "defectAnalysis": {
    "severityScore": 0-100的严重程度,
    "primaryDefects": [
      {
        "type": "缺陷类型",
        "impact": "影响描述",
        "progressionRate": "发展速度：缓慢/中等/快速"
      }
    ],
    "defectDistribution": {
      "点蚀": 百分比,
      "剥落": 百分比,
      "压伤": 百分比,
      "擦伤": 百分比
    }
  },
  "maintenanceRecommendations": [
    {
      "priority": "高/中/低",
      "action": "建议采取的行动",
      "timeline": "建议时间范围",
      "expectedBenefit": "预期效果"
    }
  ],
  "performanceMetrics": {
    "efficiencyLoss": 百分比,
    "vibrationIncrease": 百分比,
    "noiseLevel": "正常/轻微/明显",
    "temperatureRisk": "低/中/高"
  }
}`;

            return prompt;
        }

        // 调用大模型API
        async function callAIModel(prompt) {
            try {
                const response = await fetch('http://localhost:8080/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'deepseek-r1:1.5b',
                        messages: [
                            {
                                role: 'system',
                                content: '你是一个专业的齿轮寿命预测专家，精通机械工程和预测性维护。请严格按照要求的JSON格式返回分析结果。'
                            },
                            {
                                role: 'user',
                                content: prompt
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 2000
                    })
                });

                if (!response.ok) {
                    throw new Error('模型调用失败');
                }

                const data = await response.json();
                const content = data.choices[0].message.content;

                // 尝试解析JSON响应
                try {
                    return JSON.parse(content);
                } catch (e) {
                    // 如果响应不是纯JSON，尝试提取JSON部分
                    const jsonMatch = content.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        return JSON.parse(jsonMatch[0]);
                    }
                    throw new Error('无法解析模型响应');
                }
            } catch (error) {
                console.error('AI模型调用错误:', error);
                // 返回模拟数据用于演示
                return getMockAnalysis();
            }
        }

        // 模拟分析结果（用于演示）
        function getMockAnalysis() {
            return {
                lifeAnalysis: {
                    remainingLife: {
                        value: 8500,
                        unit: "小时",
                        confidence: 0.82
                    },
                    currentCondition: {
                        score: 75,
                        level: "良好",
                        description: "齿轮整体状况良好，但已出现早期磨损迹象"
                    },
                    riskAssessment: {
                        immediateRisk: "低",
                        criticalComponents: ["齿面接触区域", "齿根部"],
                        failureProbability: 0.15
                    }
                },
                defectAnalysis: {
                    severityScore: 25,
                    primaryDefects: [
                        {
                            type: "点蚀",
                            impact: "轻微影响传动效率，可能导致噪音增加",
                            progressionRate: "缓慢"
                        }
                    ],
                    defectDistribution: {
                        "点蚀": 45,
                        "剥落": 20,
                        "压伤": 20,
                        "擦伤": 15
                    }
                },
                maintenanceRecommendations: [
                    {
                        priority: "中",
                        action: "更换润滑油并检查润滑系统",
                        timeline: "未来500小时内",
                        expectedBenefit: "延长寿命20-30%"
                    },
                    {
                        priority: "低",
                        action: "定期监测振动和温度",
                        timeline: "每100小时",
                        expectedBenefit: "及早发现异常"
                    }
                ],
                performanceMetrics: {
                    efficiencyLoss: 5,
                    vibrationIncrease: 15,
                    noiseLevel: "轻微",
                    temperatureRisk: "低"
                }
            };
        }

        // 渲染分析报告
        function renderReport(analysis) {
            const { lifeAnalysis, defectAnalysis, maintenanceRecommendations, performanceMetrics } = analysis;

            let reportHTML = `
                <!-- 寿命预测 -->
                <div class="report-section">
                    <div class="section-title">
                        <div class="section-icon">⏱️</div>
                        寿命预测分析
                    </div>

                    <div class="life-prediction-chart">
                        <div class="life-meter">
                            <div class="life-circle">
                                <div class="life-inner">
                                    <div class="life-value">${lifeAnalysis.remainingLife.value}</div>
                                    <div class="life-unit">预计剩余小时</div>
                                </div>
                            </div>
                        </div>

                        <div class="analysis-grid">
                            <div class="analysis-item">
                                <div class="analysis-label">健康评分</div>
                                <div class="analysis-value">${lifeAnalysis.currentCondition.score}/100</div>
                            </div>
                            <div class="analysis-item">
                                <div class="analysis-label">置信度</div>
                                <div class="analysis-value">${(lifeAnalysis.remainingLife.confidence * 100).toFixed(0)}%</div>
                            </div>
                            <div class="analysis-item">
                                <div class="analysis-label">状态等级</div>
                                <div class="analysis-value">${lifeAnalysis.currentCondition.level}</div>
                            </div>
                            <div class="analysis-item">
                                <div class="analysis-label">失效概率</div>
                                <div class="analysis-value">${(lifeAnalysis.riskAssessment.failureProbability * 100).toFixed(0)}%</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 风险评估 -->
                <div class="report-section">
                    <div class="section-title">
                        <div class="section-icon">⚠️</div>
                        风险评估
                    </div>

                    <div class="risk-levels">
                        <div class="risk-card ${lifeAnalysis.riskAssessment.immediateRisk === '低' ? 'risk-low' :
                                               lifeAnalysis.riskAssessment.immediateRisk === '中' ? 'risk-medium' : 'risk-high'}">
                            <div>即时风险</div>
                            <div style="font-size: 24px; margin-top: 8px;">${lifeAnalysis.riskAssessment.immediateRisk}</div>
                        </div>
                        <div class="risk-card ${defectAnalysis.severityScore < 30 ? 'risk-low' :
                                               defectAnalysis.severityScore < 70 ? 'risk-medium' : 'risk-high'}">
                            <div>缺陷严重度</div>
                            <div style="font-size: 24px; margin-top: 8px;">${defectAnalysis.severityScore}%</div>
                        </div>
                        <div class="risk-card ${performanceMetrics.efficiencyLoss < 10 ? 'risk-low' :
                                               performanceMetrics.efficiencyLoss < 20 ? 'risk-medium' : 'risk-high'}">
                            <div>效率损失</div>
                            <div style="font-size: 24px; margin-top: 8px;">${performanceMetrics.efficiencyLoss}%</div>
                        </div>
                    </div>
                </div>

                <!-- 缺陷分析 -->
                <div class="report-section">
                    <div class="section-title">
                        <div class="section-icon">🔍</div>
                        缺陷详细分析
                    </div>

                    ${defectAnalysis.primaryDefects.map(defect => `
                        <div class="recommendation-card" style="background: #FEF3C7; border-color: #F59E0B;">
                            <div class="recommendation-title">${defect.type}</div>
                            <div class="recommendation-text">
                                影响：${defect.impact}<br>
                                发展速度：${defect.progressionRate}
                            </div>
                        </div>
                    `).join('')}
                </div>

                <!-- 维护建议 -->
                <div class="report-section">
                    <div class="section-title">
                        <div class="section-icon">🛠️</div>
                        维护建议
                    </div>

                    ${maintenanceRecommendations.map(rec => `
                        <div class="recommendation-card">
                            <div class="recommendation-title">
                                <span class="status-badge ${rec.priority === '高' ? 'status-danger' :
                                                          rec.priority === '中' ? 'status-warning' : 'status-good'}">
                                    ${rec.priority}优先级
                                </span>
                                ${rec.action}
                            </div>
                            <div class="recommendation-text">
                                时间范围：${rec.timeline}<br>
                                预期效果：${rec.expectedBenefit}
                            </div>
                        </div>
                    `).join('')}
                </div>

                <!-- 性能指标 -->
                <div class="report-section">
                    <div class="section-title">
                        <div class="section-icon">📊</div>
                        性能指标
                    </div>

                    <div class="analysis-grid">
                        <div class="analysis-item">
                            <div class="analysis-label">振动增加</div>
                            <div class="analysis-value">${performanceMetrics.vibrationIncrease}%</div>
                        </div>
                        <div class="analysis-item">
                            <div class="analysis-label">噪音水平</div>
                            <div class="analysis-value">${performanceMetrics.noiseLevel}</div>
                        </div>
                        <div class="analysis-item">
                            <div class="analysis-label">温度风险</div>
                            <div class="analysis-value">${performanceMetrics.temperatureRisk}</div>
                        </div>
                        <div class="analysis-item">
                            <div class="analysis-label">效率损失</div>
                            <div class="analysis-value">${performanceMetrics.efficiencyLoss}%</div>
                        </div>
                    </div>
                </div>
            `;

            reportContainer.innerHTML = reportHTML;
        }

        // 分析按钮点击事件
        analyzeBtn.addEventListener('click', async () => {
            const defectDataStr = defectDataInput.value.trim();
            const runningHours = parseInt(runningHoursInput.value) || 0;

            if (!defectDataStr) {
                alert('请输入缺陷检测结果');
                return;
            }

            let defectData;
            try {
                defectData = JSON.parse(defectDataStr);
            } catch (e) {
                alert('缺陷数据格式错误，请输入有效的JSON');
                return;
            }

            // 显示加载状态
            reportContainer.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">AI正在分析中...</div>
                </div>
            `;

            analyzeBtn.disabled = true;

            try {
                // 构建提示词
                const prompt = buildPrompt(defectData, runningHours);

                // 调用AI模型
                const analysis = await callAIModel(prompt);

                // 渲染报告
                renderReport(analysis);
            } catch (error) {
                console.error('分析失败:', error);
                reportContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">❌</div>
                        <div class="empty-title">分析失败</div>
                        <div>请检查模型连接状态或使用模拟数据</div>
                    </div>
                `;
            } finally {
                analyzeBtn.disabled = false;
            }
        });

        // 初始化
        checkModelStatus();
        setInterval(checkModelStatus, 30000);

        // 提供示例数据
        defectDataInput.value = `[
  {
    "class": 0,
    "name": "点蚀",
    "confidence": 0.85,
    "bbox": {"x": 100, "y": 200, "width": 50, "height": 50}
  },
  {
    "class": 1,
    "name": "剥落",
    "confidence": 0.72,
    "bbox": {"x": 250, "y": 150, "width": 60, "height": 40}
  }
]`;
        runningHoursInput.value = "5000";
    </script>
</body>
</html>
