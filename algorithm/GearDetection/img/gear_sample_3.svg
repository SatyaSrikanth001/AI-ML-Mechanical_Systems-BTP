<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- 齿轮外圈 -->
  <circle cx="400" cy="300" r="200" fill="#cbd5e1" stroke="#475569" stroke-width="4"/>
  
  <!-- 齿轮内圈 -->
  <circle cx="400" cy="300" r="80" fill="#f1f5f9" stroke="#475569" stroke-width="3"/>
  
  <!-- 齿轮齿 -->
  <g stroke="#475569" stroke-width="3" fill="#cbd5e1">
    <!-- 20个齿 -->
    <path d="M400,100 L425,45 L375,45 Z" />
    <path d="M458,115 L500,70 L465,50 Z" />
    <path d="M510,165 L565,140 L550,100 Z" />
    <path d="M545,230 L605,230 L595,190 Z" />
    <path d="M565,300 L625,300 L625,260 Z" />
    <path d="M545,370 L605,370 L595,410 Z" />
    <path d="M510,435 L565,460 L550,500 Z" />
    <path d="M458,485 L500,530 L465,550 Z" />
    <path d="M400,500 L425,555 L375,555 Z" />
    <path d="M342,485 L300,530 L335,550 Z" />
    <path d="M290,435 L235,460 L250,500 Z" />
    <path d="M255,370 L195,370 L205,410 Z" />
    <path d="M235,300 L175,300 L175,260 Z" />
    <path d="M255,230 L195,230 L205,190 Z" />
    <path d="M290,165 L235,140 L250,100 Z" />
    <path d="M342,115 L300,70 L335,50 Z" />
  </g>
  
  <!-- 齿轮中心孔 -->
  <circle cx="400" cy="300" r="40" fill="#f1f5f9" stroke="#475569" stroke-width="3"/>
  
  <!-- 缺陷：点蚀 (红色) -->
  <g fill="#FF3B30" opacity="0.8">
    <circle cx="180" cy="140" r="5" />
    <circle cx="185" cy="145" r="4" />
    <circle cx="175" cy="138" r="3" />
    <circle cx="182" cy="135" r="4" />
    <circle cx="178" cy="148" r="3" />
  </g>
  
  <!-- 缺陷：剥落 (橙色) -->
  <path d="M280,190 Q300,180 320,190 Q330,210 320,230 Q300,240 280,230 Q270,210 280,190 Z" 
        fill="#FF9500" opacity="0.8" stroke="#FF9500" stroke-width="2" />
  <path d="M290,200 L310,210 L305,220 L285,215 Z" fill="#f1f5f9" />
  <path d="M295,215 L315,225 L310,235 L290,230 Z" fill="#f1f5f9" />
  
  <!-- 缺陷：压伤 (绿色) -->
  <path d="M380,220 Q400,210 420,220 Q430,240 420,260 Q400,270 380,260 Q370,240 380,220 Z" 
        fill="#4CD964" opacity="0.7" stroke="#4CD964" stroke-width="2" />
  
  <!-- 缺陷：擦伤 (蓝色) -->
  <g stroke="#007AFF" stroke-width="3" stroke-linecap="round">
    <line x1="450" y1="150" x2="540" y2="150" />
    <line x1="455" y1="160" x2="535" y2="160" />
    <line x1="460" y1="170" x2="530" y2="170" />
    <line x1="465" y1="180" x2="525" y2="180" />
    <line x1="470" y1="190" x2="520" y2="190" />
  </g>
  
  <!-- 缺陷边界框 -->
  <rect x="180" y="140" width="50" height="40" fill="none" stroke="#FF3B30" stroke-width="2" stroke-dasharray="5,5" />
  <rect x="280" y="190" width="65" height="55" fill="none" stroke="#FF9500" stroke-width="2" stroke-dasharray="5,5" />
  <rect x="380" y="220" width="70" height="60" fill="none" stroke="#4CD964" stroke-width="2" stroke-dasharray="5,5" />
  <rect x="450" y="150" width="90" height="40" fill="none" stroke="#007AFF" stroke-width="2" stroke-dasharray="5,5" />
  
  <!-- 缺陷标签 -->
  <g font-family="Arial" font-size="12" font-weight="bold">
    <rect x="180" y="125" width="60" height="15" fill="#FF3B30" />
    <text x="185" y="137" fill="white">点蚀 81%</text>
    
    <rect x="280" y="175" width="70" height="15" fill="#FF9500" />
    <text x="285" y="187" fill="white">剥落 79%</text>
    
    <rect x="380" y="205" width="70" height="15" fill="#4CD964" />
    <text x="385" y="217" fill="white">压伤 83%</text>
    
    <rect x="450" y="135" width="70" height="15" fill="#007AFF" />
    <text x="455" y="147" fill="white">擦伤 75%</text>
  </g>
  
  <!-- 添加一些细节 -->
  <g fill="#64748b" opacity="0.2">
    <circle cx="400" cy="300" r="160" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" />
    <circle cx="400" cy="300" r="120" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" />
    <line x1="200" y1="300" x2="600" y2="300" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" />
    <line x1="400" y1="100" x2="400" y2="500" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" />
  </g>
</svg>